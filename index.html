<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧全方位防災護窗系統</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #007bff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --secondary: #6c757d;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 { color: var(--primary); margin-bottom: 15px;}
        
        .control-panel {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease;
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }
        .data-point {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .alert-box {
            display: none;
            padding: 15px;
            background-color: var(--danger);
            color: white;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 5px;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: var(--secondary); cursor: not-allowed; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-group button { flex: 1; }
        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: #bd2130; }

        /* 狀態顏色 */
        .status-safe { color: var(--success); font-weight: bold; }
        .status-warning { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>智慧全方位防災護窗系統</h1>
        
        <div class="control-panel">
            <button id="connect-btn">🔌 連接 Micro:bit</button>
            <button id="disconnect-btn" disabled>🛑 斷開連接</button>
            <span id="connection-status" style="margin-left: 10px; font-weight: bold; color: var(--secondary);">未連接</span>
        </div>
    </header>

    <div id="global-alert" class="alert-box">
        ⚠️ 系統警報：偵測到惡劣天氣，防護罩已自動部署！
    </div>

    <div class="dashboard">
        <div class="card" id="weather-card">
            <h2>🌤️ 實時天氣 (香港天文台)</h2>
            <p>溫度: <span id="temp" class="data-point">--</span> °C</p>
            <p>濕度: <span id="humidity" class="data-point">--</span> %</p>
        </div>

        <div class="card" id="rain-card">
            <h2>🌧️ 降雨與水位監測</h2>
            <p>天文台降雨預測: <span id="hko-rain" class="data-point" style="font-size: 1.5rem;">--</span></p>
            <p>即時水位 (Micro:bit): <span id="water-level" class="data-point">0</span></p>
            <p>環境狀態: <span id="rain-status" class="status-safe">安全 (乾燥)</span></p>
        </div>

        <div class="card" id="aqi-card">
            <h2>💨 空氣與沙塵監測</h2>
            <p>實時空氣質素: <span id="aqi" class="data-point">良好</span></p>
            <p>環境狀態: <span id="env-status" class="status-safe">安全 (未偵測到沙塵)</span></p>
            <div class="btn-group">
                <button onclick="simulateBadAir()">模擬沙塵暴</button>
                <button onclick="stopSimulation()" class="btn-danger">停止模擬</button>
            </div>
        </div>

        <div class="card" id="wind-card">
            <h2>🌪️ 實時風速 (Micro:bit)</h2>
            <p>當前風速: <span id="wind-speed" class="data-point">0</span> km/h</p>
            <p>環境狀態: <span id="wind-status" class="status-safe">安全 (微風)</span></p>
        </div>

        <div class="card" id="maintenance-card">
            <h2>⚙️ 系統保養報告 (週報)</h2>
            <p>本週開關次數: <span id="usage-count" class="data-point">0</span> 次</p>
            <p id="maintenance-msg">系統狀態良好，無需保養。</p>
            <button onclick="simulateWindowUsage()">模擬窗戶開關 (+5次)</button>
        </div>
    </div>

    <script>
        // --- 1. 獲取香港天文台 API 數據 ---
        async function fetchHKOWeather() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const data = await res.json();
                
                document.getElementById('temp').innerText = data.temperature.data[1].value;
                document.getElementById('humidity').innerText = data.humidity.data[0].value;
                
                if (data.rainfall && data.rainfall.data[0].max > 0) {
                    document.getElementById('hko-rain').innerText = "有雨 🌧️";
                    triggerSystemAlert("天文台預測有雨，防護系統啟動！");
                } else {
                    document.getElementById('hko-rain').innerText = "無雨";
                }
            } catch (error) {
                console.error('無法取得天文台數據:', error);
            }
        }

        // --- 2. 警報與模擬控制 ---
        function triggerSystemAlert(message) {
            const alertBox = document.getElementById('global-alert');
            alertBox.style.display = 'block';
            alertBox.innerText = message;
        }

        function resetSystemAlert() {
            document.getElementById('global-alert').style.display = 'none';
        }

        function simulateBadAir() {
            document.getElementById('aqi').innerText = "嚴重 ⚠️";
            document.getElementById('env-status').innerText = "危險 (懸浮粒子過高)";
            document.getElementById('env-status').className = "status-warning";
            triggerSystemAlert("沙塵濃度超標，自動關閉窗戶防護罩！");
        }

        function stopSimulation() {
            document.getElementById('aqi').innerText = "良好";
            document.getElementById('env-status').innerText = "安全 (未偵測到沙塵)";
            document.getElementById('env-status').className = "status-safe";
            resetSystemAlert();
        }

        let usageCount = 0;
        function simulateWindowUsage() {
            usageCount += 5;
            document.getElementById('usage-count').innerText = usageCount;
            const maintenanceCard = document.getElementById('maintenance-card');
            const msg = document.getElementById('maintenance-msg');

            if (usageCount >= 20) {
                maintenanceCard.style.backgroundColor = 'var(--warning)';
                msg.innerText = "⚠️ 警告：開關過於頻繁，請檢查窗戶滑軌與機械結構！";
                msg.style.fontWeight = "bold";
            }
        }

        // --- 3. Micro:bit Web Serial API (全域連線控制) ---
        let port;
        let reader;
        let keepReading = false;

        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const statusText = document.getElementById('connection-status');

        connectBtn.addEventListener('click', async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                keepReading = true;
                statusText.innerText = "已連接 🟢";
                statusText.style.color = "var(--success)";
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                
                readSerialData(); // 開始讀取數據
            } catch (error) {
                console.error('Serial 連接失敗:', error);
                alert("連接失敗。請確保已接上 Micro:bit。");
            }
        });

        disconnectBtn.addEventListener('click', async () => {
            keepReading = false;
            if (reader) {
                await reader.cancel();
            }
            if (port) {
                await port.close();
            }
            statusText.innerText = "未連接 🔴";
            statusText.style.color = "var(--secondary)";
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            
            // 斷開時數值歸零
            document.getElementById('wind-speed').innerText = "0";
            document.getElementById('water-level').innerText = "0";
        });

        async function readSerialData() {
            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();
            let buffer = "";

            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += value;
                    let lines = buffer.split('\n');
                    buffer = lines.pop(); // 保留最後一行未完成的數據

                    for (let line of lines) {
                        line = line.trim();
                        // 預期 MakeCode 傳來的格式為 "名稱:數值"，例如 "wind:45" 或 "water:300"
                        if (line.includes(':')) {
                            let parts = line.split(':');
                            let key = parts[0].trim();
                            let val = parseInt(parts[1].trim());

                            if (key === 'wind' && !isNaN(val)) {
                                document.getElementById('wind-speed').innerText = val;
                                if (val > 63) {
                                    document.getElementById('wind-status').innerText = "危險 (強風)";
                                    document.getElementById('wind-status').className = "status-warning";
                                    triggerSystemAlert("風速達到強風級別，物理盾牌已啟動！");
                                } else {
                                    document.getElementById('wind-status').innerText = "安全 (微風)";
                                    document.getElementById('wind-status').className = "status-safe";
                                }
                            }
                            
                            if (key === 'water' && !isNaN(val)) {
                                document.getElementById('water-level').innerText = val;
                                // 假設水位數值超過 500 代表有水/下雨
                                if (val > 500) {
                                    document.getElementById('rain-status').innerText = "危險 (積水/下雨)";
                                    document.getElementById('rain-status').className = "status-warning";
                                    triggerSystemAlert("感應器偵測到水分，防護系統啟動！");
                                } else {
                                    document.getElementById('rain-status').innerText = "安全 (乾燥)";
                                    document.getElementById('rain-status').className = "status-safe";
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                console.error("讀取中斷", error);
            } finally {
                reader.releaseLock();
            }
        }

        // 網頁載入時執行
        window.onload = () => {
            fetchHKOWeather();
            setInterval(fetchHKOWeather, 600000); 
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't 窗事發 —— 智慧護窗管理平台</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #007bff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { color: var(--primary); }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease;
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }
        .data-point {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .alert-box {
            display: none;
            padding: 10px;
            background-color: var(--danger);
            color: white;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { background-color: #0056b3; }
        
        /* 狀態顏色 */
        .status-safe { color: var(--success); }
        .status-warning { color: var(--danger); }
    </style>
</head>
<body>

    <header>
        <h1>Don't 窗事發 🛡️</h1>
        <p>智慧全方位防災護窗系統 - 控制中樞</p>
    </header>

    <div id="global-alert" class="alert-box">
        ⚠️ 系統警報：偵測到惡劣天氣，防護罩已自動部署！
    </div>

    <div class="dashboard">
        <div class="card" id="weather-card">
            <h2>🌦️ 實時天氣 (香港天文台)</h2>
            <p>溫度: <span id="temp" class="data-point">--</span> °C</p>
            <p>濕度: <span id="humidity" class="data-point">--</span> %</p>
            <p>降雨預測: <span id="rain" class="data-point">--</span></p>
            <p>警告信號: <span id="warning-signal">無</span></p>
        </div>

        <div class="card" id="aqi-card">
            <h2>💨 空氣與沙塵監測</h2>
            <p>實時空氣質素: <span id="aqi" class="data-point">良好</span></p>
            <p>環境狀態: <span id="env-status" class="status-safe">安全 (未偵測到沙塵)</span></p>
            <button onclick="simulateBadAir()">模擬沙塵暴來襲</button>
        </div>

        <div class="card" id="wind-card">
            <h2>🌪️ 實時風速 (Micro:bit)</h2>
            <p>當前風速: <span id="wind-speed" class="data-point">0</span> km/h</p>
            <p>防護罩狀態: <span id="shield-status" class="status-safe">開啟 (待機中)</span></p>
            <button id="connect-btn">🔌 連接 Micro:bit (USB)</button>
        </div>

        <div class="card" id="maintenance-card">
            <h2>⚙️ 系統保養報告 (週報)</h2>
            <p>本週開關次數: <span id="usage-count" class="data-point">0</span> 次</p>
            <p id="maintenance-msg">系統狀態良好，無需保養。</p>
            <button onclick="simulateWindowUsage()">模擬窗戶開關 (+5次)</button>
        </div>
    </div>

    <script>
        // --- 1. 獲取香港天文台 API 數據 ---
        async function fetchHKOWeather() {
            try {
                // 獲取分區天氣報告 (包含溫濕度)
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const data = await res.json();
                
                // 更新 UI (取香港天文台總部數據)
                document.getElementById('temp').innerText = data.temperature.data[1].value;
                document.getElementById('humidity').innerText = data.humidity.data[0].value;
                
                // 檢查是否有降雨 (如有降雨數據則觸發警報)
                if (data.rainfall && data.rainfall.data[0].max > 0) {
                    document.getElementById('rain').innerText = "有雨 🌧️";
                    triggerSystemAlert("偵測到降雨，防護系統啟動！");
                } else {
                    document.getElementById('rain').innerText = "無雨";
                }
            } catch (error) {
                console.error('無法取得天文台數據:', error);
            }
        }

        // --- 2. 模擬保養警報 (碰撞感應器邏輯) ---
        let usageCount = 0;
        const usageLimit = 20; // 測試用閾值：超過20次變色警告

        function simulateWindowUsage() {
            usageCount += 5;
            document.getElementById('usage-count').innerText = usageCount;

            const maintenanceCard = document.getElementById('maintenance-card');
            const msg = document.getElementById('maintenance-msg');

            if (usageCount >= usageLimit) {
                // 改變卡片顏色以作無聲警報
                maintenanceCard.style.backgroundColor = 'var(--warning)';
                msg.innerText = "⚠️ 警告：開關過於頻繁，請檢查窗戶滑軌與機械結構！";
                msg.style.fontWeight = "bold";
            }
        }

        // --- 3. 模擬沙塵暴與空氣質素預警 ---
        function simulateBadAir() {
            document.getElementById('aqi').innerText = "嚴重 ⚠️";
            document.getElementById('env-status').innerText = "危險 (懸浮粒子過高)";
            document.getElementById('env-status').className = "status-warning";
            triggerSystemAlert("沙塵濃度超標，自動關閉窗戶！");
        }

        // --- 4. 系統全域警報觸發 ---
        function triggerSystemAlert(message) {
            const alertBox = document.getElementById('global-alert');
            alertBox.style.display = 'block';
            alertBox.innerText = message;
            document.getElementById('shield-status').innerText = "已關閉 (防護中 🛡️)";
            document.getElementById('shield-status').className = "status-warning";
        }

        // --- 5. Micro:bit Web Serial API 連接 (讀取風速) ---
        let port;
        document.getElementById('connect-btn').addEventListener('click', async () => {
            try {
                // 請求用戶選擇串列埠 (Micro:bit)
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 }); // Micro:bit 預設鮑率
                alert("Micro:bit 連接成功！");
                
                const textDecoder = new TextDecoderStream();
                const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();

                // 持續讀取 Micro:bit 傳來的數據
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) { reader.releaseLock(); break; }
                    
                    // 假設 Micro:bit 印出風速數值 (例如 "65\r\n")
                    let windSpeed = parseInt(value.trim());
                    if (!isNaN(windSpeed)) {
                        document.getElementById('wind-speed').innerText = windSpeed;
                        // 風速超過 63km/h (八號風球標準) 觸發關窗
                        if (windSpeed > 63) {
                            triggerSystemAlert("風速達到強風級別，物理盾牌已啟動！");
                        }
                    }
                }
            } catch (error) {
                console.error('Serial 連接失敗:', error);
                alert("連接失敗。請確保使用 Chrome 瀏覽器並已接上 Micro:bit。");
            }
        });

        // 網頁載入時執行
        window.onload = () => {
            fetchHKOWeather();
            // 每 10 分鐘更新一次天氣
            setInterval(fetchHKOWeather, 600000); 
        };
    </script>
</body>
</html>

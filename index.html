<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧全方位防災護窗系統 v4.1</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #007bff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --secondary: #6c757d;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); }
        .version-tag { font-size: 0.5em; color: var(--secondary); vertical-align: middle; }
        .control-panel { background-color: #e9ecef; padding: 15px; border-radius: 8px; display: inline-block; margin-bottom: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; }
        .data-point { font-size: 2rem; font-weight: bold; margin: 10px 0; color: var(--primary); }
        .data-sub { font-size: 1.2rem; font-weight: bold; color: var(--secondary); }
        
        .local-alert { 
            visibility: hidden; opacity: 0; margin-top: auto; padding: 10px; 
            background-color: var(--danger); color: white; text-align: center; 
            border-radius: 8px; font-weight: bold; font-size: 1rem; transition: opacity 0.3s ease;
        }
        .local-alert.show { visibility: visible; opacity: 1; }

        button { background-color: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; margin-top: 5px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: var(--secondary); cursor: not-allowed; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; margin-bottom: 15px; }
        .btn-danger { background-color: var(--danger); }
        .status-safe { color: var(--success); font-weight: bold; }
        .status-warning { color: var(--danger); font-weight: bold; }
        
        .device-status { padding: 5px 10px; border-radius: 5px; background-color: #f8f9fa; display: inline-block; margin-top: 5px; border: 1px solid #dee2e6; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>智慧全方位防災護窗系統 <span class="version-tag">v4.1</span></h1>
        <div class="control-panel">
            <button id="connect-btn">🔌 連接 Micro:bit</button>
            <button id="disconnect-btn" disabled>🛑 斷開連接</button>
            <span id="connection-status" style="margin-left: 10px; font-weight: bold; color: var(--secondary);">未連接</span>
        </div>
    </header>

    <div class="dashboard">
        <div class="card">
            <h2>🌦️ 實時天氣 (香港天文台)</h2>
            <p>溫度: <span id="temp" class="data-point">--</span> °C</p>
            <p>濕度: <span id="humidity" class="data-point">--</span> %</p>
        </div>

        <div class="card">
            <h2>🌧️ 降雨與水位監測</h2>
            <p>P1 感應器數值: <span id="water-level" class="data-point">0</span></p>
            <p>環境狀態: <span id="rain-status" class="status-safe">安全 (乾燥)</span></p>
            <div class="device-status">室內窗戶狀態: <span class="window-status status-safe">已開啟 (通風)</span></div>
        </div>

        <div class="card">
            <h2>💨 空氣與沙塵監測</h2>
            <p>空氣質素: <span id="aqi" class="data-point">良好</span></p>
            <p>環境狀態: <span id="env-status" class="status-safe">安全</span></p>
            <div class="device-status">室內窗戶狀態: <span class="window-status status-safe">已開啟 (通風)</span></div>
            <div class="btn-group">
                <button onclick="simulateBadAir()">模擬沙塵暴</button>
                <button onclick="stopSimulation()" class="btn-danger">停止模擬</button>
            </div>
            <div id="dust-alert" class="local-alert">⚠️ 沙塵濃度超標，自動關閉窗戶！</div>
        </div>

        <div class="card" id="wind-card">
            <h2>🌪️ 實時風速</h2>
            <p>P2 感應器數值: <span id="wind-raw" class="data-point">0</span></p>
            <p>換算風速: <span id="wind-speed" class="data-sub">0</span> km/h</p>
            <p>環境狀態: <span id="wind-status" class="status-safe">安全 (微風)</span></p>
            <div class="device-status">物理盾牌狀態: <span id="shield-status" class="status-safe">已開啟 (待機)</span></div>
        </div>

        <div class="card" id="maintenance-card">
            <h2>⚙️ 系統保養報告 (週報)</h2>
            <p>本週開關次數: <span id="usage-count" class="data-point">0</span> 次</p>
            <p id="maintenance-msg">系統狀態良好。</p>
            <button onclick="simulateWindowUsage()">模擬開關 (+5)</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 核心邏輯：設備狀態分離管理器
        // ==========================================
        let isWindDanger = false;
        let isDustDanger = false;
        let isRainDanger = false;

        function updateDevicesStatus() {
            // 1. 防護罩邏輯 (只受強風影響)
            const shieldStatus = document.getElementById('shield-status');
            if (isWindDanger) {
                shieldStatus.innerText = "已關閉 (防禦中 🛡️)";
                shieldStatus.className = "status-warning";
            } else {
                shieldStatus.innerText = "已開啟 (待機)";
                shieldStatus.className = "status-safe";
            }

            // 2. 窗戶本體邏輯 (受沙塵暴 或 降雨影響)
            const windowStatusElements = document.querySelectorAll('.window-status');
            if (isDustDanger || isRainDanger) {
                windowStatusElements.forEach(el => {
                    // 同步更新所有標示室內窗戶的狀態為「已關閉」
                    el.innerText = "已關閉 (防護中 🪟)";
                    el.className = "status-warning";
                });
            } else {
                windowStatusElements.forEach(el => {
                    el.innerText = "已開啟 (通風)";
                    el.className = "status-safe";
                });
            }
        }

        // ==========================================
        // 按鈕專用事件
        // ==========================================
        function simulateBadAir() {
            document.getElementById('aqi').innerText = "嚴重 ⚠️";
            document.getElementById('env-status').innerText = "危險 (懸浮粒子過高)";
            document.getElementById('env-status').className = "status-warning";
            document.getElementById('dust-alert').classList.add('show');
            isDustDanger = true; 
            updateDevicesStatus(); 
        }

        function stopSimulation() {
            document.getElementById('aqi').innerText = "良好";
            document.getElementById('env-status').innerText = "安全";
            document.getElementById('env-status').className = "status-safe";
            document.getElementById('dust-alert').classList.remove('show');
            isDustDanger = false; 
            updateDevicesStatus(); 
        }

        let usageCount = 0;
        function simulateWindowUsage() {
            usageCount += 5;
            document.getElementById('usage-count').innerText = usageCount;
            if (usageCount >= 20) {
                document.getElementById('maintenance-card').style.backgroundColor = 'var(--warning)';
                document.getElementById('maintenance-msg').innerText = "⚠️ 警告：開關過於頻繁，請進行保養！";
            }
        }

        async function fetchHKOWeather() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const data = await res.json();
                document.getElementById('temp').innerText = data.temperature.data[1].value;
                document.getElementById('humidity').innerText = data.humidity.data[0].value;
            } catch (e) { console.error(e); }
        }

        // ==========================================
        // Micro:bit 序列埠讀取
        // ==========================================
        let port, reader, keepReading = false;
        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');

        connectBtn.addEventListener('click', async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                keepReading = true;
                document.getElementById('connection-status').innerText = "已連接 🟢";
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                readSerialData();
            } catch (e) { alert("連接失敗，請確認 USB 已接上。"); }
        });

        disconnectBtn.addEventListener('click', async () => {
            keepReading = false;
            if (reader) await reader.cancel();
            if (port) await port.close();
            document.getElementById('connection-status').innerText = "未連接 🔴";
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            
            isWindDanger = false; 
            isRainDanger = false;
            updateDevicesStatus(); 
        });

        async function readSerialData() {
            const textDecoder = new TextDecoderStream();
            port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();
            let buffer = "";

            while (keepReading) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += value;
                let lines = buffer.split('\n');
                buffer = lines.pop(); 

                for (let line of lines) {
                    line = line.trim();
                    if (line.includes(':')) {
                        let [key, valStr] = line.split(':');
                        let val = parseInt(valStr.trim());

                        // 處理 P2 風速 (專門控制防護罩)
                        if (key === 'wind' && !isNaN(val)) {
                            document.getElementById('wind-raw').innerText = val;
                            let kmh = Math.round((val / 1023) * 100);
                            document.getElementById('wind-speed').innerText = kmh;
                            
                            if (val > 130) {
                                document.getElementById('wind-status').innerText = "危險 (強風)";
                                document.getElementById('wind-status').className = "status-warning";
                                isWindDanger = true; 
                            } else {
                                document.getElementById('wind-status').innerText = "安全 (微風)";
                                document.getElementById('wind-status').className = "status-safe";
                                isWindDanger = false; 
                            }
                            updateDevicesStatus();
                        }
                        
                        // 處理 P1 水位 (大於 0 即視為下雨，控制室內窗戶)
                        if (key === 'water' && !isNaN(val)) {
                            document.getElementById('water-level').innerText = val;
                            
                            if (val > 0) {
                                document.getElementById('rain-status').innerText = "危險 (積水/下雨)";
                                document.getElementById('rain-status').className = "status-warning";
                                isRainDanger = true;
                            } else {
                                document.getElementById('rain-status').innerText = "安全 (乾燥)";
                                document.getElementById('rain-status').className = "status-safe";
                                isRainDanger = false;
                            }
                            updateDevicesStatus();
                        }
                    }
                }
            }
        }

        window.onload = fetchHKOWeather;
    </script>
</body>
</html>
